<!-- =========================
     student-register.html
========================= -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Register | UNICORE University</title>

    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Embedded System Architecture Styles -->
    <style>
        :root {
            --accent-blue: #3b82f6;
            --accent-gradient: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            --bg-main: #f8fafc;
            --card-shadow: 0 10px 30px -5px rgba(16, 24, 40, 0.08), 0 4px 12px -4px rgba(16, 24, 40, 0.03);
            --text-title: #0f172a;
            --text-body: #475569;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-main);
            color: var(--text-title);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding-top: 80px; /* Offset for fixed navbar */
        }

        /* =========================
           NAVBAR COMPONENT
        ========================= */
        .navbar {
            background: rgba(255, 255, 255, 0.85) !important;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(226, 232, 240, 0.8);
            padding: 16px 0;
        }

        .navbar-brand {
            font-weight: 800;
            letter-spacing: 1px;
            font-size: 1.3rem;
        }

        .navbar-brand span {
            color: var(--accent-blue);
        }

        .nav-link {
            font-weight: 500;
            color: var(--text-body) !important;
            padding: 8px 16px !important;
            transition: color 0.2s ease;
        }

        .nav-link:hover, .nav-link.active {
            color: var(--accent-blue) !important;
        }

        .btn-apply {
            background: #0f172a;
            color: #fff !important;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 10px;
            transition: all 0.2s ease;
        }

        .btn-apply:hover {
            background: #1e293b;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.15);
        }

        /* =========================
           REGISTRATION CARD
        ========================= */
        .register-section {
            flex: 1;
            display: flex;
            align-items: center;
            padding: 40px 0;
        }

        .register-card {
            background: #fff;
            padding: 45px;
            border-radius: 24px;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }

        .register-icon {
            width: 64px;
            height: 64px;
            background: #eff6ff;
            color: var(--accent-blue);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin: 0 auto 20px auto;
        }

        .register-title {
            font-weight: 800;
            color: var(--text-title);
            letter-spacing: -0.5px;
        }

        /* =========================
           FORM CONTROLS
        ========================= */
        .form-label {
            font-weight: 600;
            font-size: 0.87rem;
            color: #334155;
            margin-bottom: 8px;
        }

        .form-control, .form-select {
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid #cbd5e1;
            font-size: 0.95rem;
            color: var(--text-title);
            transition: all 0.2s ease;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
            background-color: #fff;
        }

        /* Password Wrapper for Eye Icon Toggle */
        .password-input-wrapper {
            position: relative;
        }

        .password-input-wrapper .form-control {
            padding-right: 45px;
        }

        .password-toggle-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #94a3b8;
            transition: color 0.2s ease;
            z-index: 10;
        }

        .password-toggle-icon:hover {
            color: var(--accent-blue);
        }

        .form-check-input {
            width: 18px;
            height: 18px;
            border-radius: 6px !important;
            margin-top: 3px;
            border-color: #cbd5e1;
        }

        .form-check-input:checked {
            background-color: var(--accent-blue);
            border-color: var(--accent-blue);
        }

        .form-check-label {
            font-size: 0.9rem;
            color: var(--text-body);
            font-weight: 500;
            user-select: none;
            padding-left: 4px;
        }

        .register-btn {
            background: var(--accent-gradient);
            border: none;
            color: #fff;
            font-weight: 600;
            padding: 14px;
            border-radius: 12px;
            width: 100%;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 10px;
        }

        .register-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.25);
        }

        /* =========================
           RESPONSIVE CONFIGS
        ========================= */
        @media (max-width: 768px) {
            .register-card {
                padding: 30px 20px;
            }
            body {
                padding-top: 100px;
            }
        }
    </style>
</head>

<body>

<!-- Navbar Component -->
<nav class="navbar navbar-expand-lg fixed-top shadow-sm">
    <div class="container">
        <a class="navbar-brand text-dark" href="index.html">
            <i class="fas fa-graduation-cap text-primary me-2"></i>UNI<span>CORE</span>
        </a>

        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-lg-center">
                <li class="nav-item">
                    <a class="nav-link" href="index.html">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="student-register.html">Register</a>
                </li>
                <li class="nav-item ms-lg-3 mt-2 mt-lg-0">
                    <a href="student-login.html" class="btn btn-apply d-block text-center">
                        Student Login
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Register Layout Container -->
<section class="register-section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8 col-xl-7">

                <div class="register-card">
                    <div class="text-center mb-4">
                        <div class="register-icon">
                            <i class="fas fa-user-graduate"></i>
                        </div>
                        <h2 class="register-title mb-2">Student Registration</h2>
                        <p class="text-muted mb-0">
                            Create your unified student credential profile context below to synchronize university portal systems.
                        </p>
                    </div>

                    <!-- Client Registration Form Element -->
                    <form id="registerForm">
                        <div class="row g-3">

                            <!-- Full Name -->
                            <div class="col-md-6">
                                <label class="form-label" for="registerName">Full Name</label>
                                <input type="text" id="registerName" class="form-control" placeholder="Enter full name" required>
                            </div>

                            <!-- Email Address -->
                            <div class="col-md-6">
                                <label class="form-label" for="registerEmail">Email Address</label>
                                <input type="email" id="registerEmail" class="form-control" placeholder="name@domain.edu" required>
                            </div>

                            <!-- Mobile Number -->
                            <div class="col-md-6">
                                <label class="form-label" for="registerMobile">Mobile Number</label>
                                <input type="tel" id="registerMobile" class="form-control" placeholder="Enter phone number" required>
                            </div>

                            <!-- Date of Birth -->
                            <div class="col-md-6">
                                <label class="form-label" for="registerDOB">Date of Birth</label>
                                <input type="date" id="registerDOB" class="form-control" required>
                            </div>

                            <!-- Course Dropdown selection menu -->
                            <div class="col-md-6">
                                <label class="form-label" for="registerCourse">Academic Course Program</label>
                                <select id="registerCourse" class="form-select" required>
                                    <option value="" disabled selected>Choose Course</option>
                                    <option value="BCA Student (Sem IV)">BCA</option>
                                    <option value="B.Tech Candidate (Sem II)">B.Tech</option>
                                    <option value="BBA Student (Sem II)">BBA</option>
                                    <option value="MBA Candidate (Sem II)">MBA</option>
                                    <option value="B.Sc Data Science (Sem II)">B.Sc Data Science</option>
                                </select>
                            </div>

                            <!-- Semester Dropdown menu selection -->
                            <div class="col-md-6">
                                <label class="form-label" for="registerSemester">Current Semester Track</label>
                                <select id="registerSemester" class="form-select" required>
                                    <option value="" disabled selected>Select Semester</option>
                                    <option>1st Semester</option>
                                    <option>2nd Semester</option>
                                    <option>3rd Semester</option>
                                    <option>4th Semester</option>
                                    <option>5th Semester</option>
                                    <option>6th Semester</option>
                                    <option>7th Semester</option>
                                    <option>8th Semester</option>
                                </select>
                            </div>

                            <!-- Password Fields wrapper with toggle feature -->
                            <div class="col-md-6">
                                <label class="form-label" for="registerPassword">Security Password</label>
                                <div class="password-input-wrapper">
                                    <input type="password" id="registerPassword" class="form-control" placeholder="Create robust password" minlength="6" required>
                                    <i class="fas fa-eye password-toggle-icon" onclick="togglePasswordVisibility('registerPassword', this)"></i>
                                </div>
                            </div>

                            <!-- Confirm Password Input with toggle feature -->
                            <div class="col-md-6">
                                <label class="form-label" for="confirmPassword">Confirm Password</label>
                                <div class="password-input-wrapper">
                                    <input type="password" id="confirmPassword" class="form-control" placeholder="Verify password security" minlength="6" required>
                                    <i class="fas fa-eye password-toggle-icon" onclick="togglePasswordVisibility('confirmPassword', this)"></i>
                                </div>
                            </div>

                            <!-- Form Verification Checkbox -->
                            <div class="col-12 my-3">
                                <div class="form-check d-flex align-items-start">
                                    <input class="form-check-input me-2" type="checkbox" id="agree" required>
                                    <label class="form-check-label" for="agree">
                                        I certify these data assertions are valid and agree to the platform Terms & Conditions.
                                    </label>
                                </div>
                            </div>

                            <!-- Submission Interactive Element -->
                            <div class="col-12">
                                <button type="submit" id="registerBtn" class="btn register-btn">
                                    Create Student Account
                                </button>
                            </div>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</section>

<!-- Core Bootstrap Runtime Bundles -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Execution Engine -->
<script>
    // Password Visibility Switcher Engine
    function togglePasswordVisibility(fieldId, iconElement) {
        const passwordField = document.getElementById(fieldId);
        if (passwordField.type === "password") {
            passwordField.type = "text";
            iconElement.classList.remove("fa-eye");
            iconElement.classList.add("fa-eye-slash");
        } else {
            passwordField.type = "password";
            iconElement.classList.remove("fa-eye-slash");
            iconElement.classList.add("fa-eye");
        }
    }

    document.addEventListener("DOMContentLoaded", () => {
        const form = document.getElementById("registerForm");

        form.addEventListener("submit", (e) => {
            e.preventDefault();

            // Extract Input Elements Values
            const name = document.getElementById("registerName").value.trim();
            const email = document.getElementById("registerEmail").value.trim();
            const mobile = document.getElementById("registerMobile").value.trim();
            const dob = document.getElementById("registerDOB").value;
            const courseSelect = document.getElementById("registerCourse");
            const majorDescription = courseSelect.options[courseSelect.selectedIndex].value;
            const password = document.getElementById("registerPassword").value;
            const confirmPassword = document.getElementById("confirmPassword").value;

            // Security mismatch validation check
            if (password !== confirmPassword) {
                alert("Security integrity violation: Passwords do not match. Please re-enter.");
                return;
            }

            // Construct student data object schema
            const studentAccountRecord = {
                email: email,
                password: password,
                fullName: name,
                major: majorDescription,
                dob: dob
            };

            // Commit structured state data into localStorage
            localStorage.setItem("registeredStudent", JSON.stringify(studentAccountRecord));

            alert("Account creation successful! Redirecting to the login panel.");
            
            // Redirect smoothly to your student login page
            window.location.href = "student-login.html";
        });
    });
</script>
</body>
</html>
