     admin-login.html
========================= -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Console Gate Authentication | UNIADMIN</title>
    
    <!-- Framework Elements -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --bg-canvas: #0f172a;
            --surface-card: #1e293b;
            --brand-admin: #38bdf8;
            --border-light: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-canvas);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 450px;
        }

        .auth-card {
            background: var(--surface-card);
            border-radius: 24px;
            padding: 40px;
            border: 1px solid var(--border-light);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        .brand-logo {
            font-size: 2rem;
            font-weight: 800;
            font-family: 'Poppins', sans-serif;
            letter-spacing: -0.5px;
            text-align: center;
            margin-bottom: 24px;
            color: #ffffff;
        }

        .brand-logo span {
            color: var(--brand-admin);
        }

        .form-control {
            background-color: #0f172a !important;
            border-color: var(--border-light);
            color: #ffffff !important;
        }

        .form-control::placeholder {
            color: #475569;
        }

        .form-control:focus {
            border-color: var(--brand-admin);
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.15);
        }

        .input-group-text {
            background-color: #0f172a !important;
            border-color: var(--border-light);
            color: var(--text-muted);
        }

        .btn-auth-submit {
            background: var(--brand-admin);
            color: #0f172a;
            font-weight: 700;
            border: none;
            padding: 12px;
            border-radius: 12px;
            transition: all 0.2s ease;
        }

        .btn-auth-submit:hover {
            background: #7dd3fc;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">
            <div class="brand-logo">UNI<span>ADMIN</span></div>
            <h5 class="fw-bold text-center mb-1 text-white">Console Secure Firewall</h5>
            <p class="text-muted text-center small mb-4">Input structural verification hashes to connect terminal.</p>

            <form id="adminLoginForm">
                <div class="mb-3">
                    <label class="form-label small fw-semibold text-muted">Admin Security Email</label>
                    <div class="input-group">
                        <span class="input-group-text border-end-0"><i class="far fa-envelope"></i></span>
                        <input type="email" id="adminLoginEmail" class="form-control border-start-0 ps-0" placeholder="admin@unicore.edu" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label small fw-semibold text-muted">Console Passphrase Key</label>
                    <div class="input-group">
                        <span class="input-group-text border-end-0"><i class="fas fa-lock"></i></span>
                        <input type="password" id="adminLoginPassword" class="form-control border-start-0 ps-0" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-auth-submit w-100 mb-3">Execute Handshake Authentication</button>

                <p class="text-center small text-muted mb-0">
                    Unallocated administrator key? <a href="admin-register.html" class="text-decoration-none fw-semibold text-info">Deploy Node</a>
                </p>
            </form>
        </div>
    </div>

    <script>
        document.getElementById("adminLoginForm").addEventListener("submit", (e) => {
            e.preventDefault();

            const email = document.getElementById("adminLoginEmail").value.trim().toLowerCase();
            const password = document.getElementById("adminLoginPassword").value;

            const adminDirectory = JSON.parse(localStorage.getItem("unicore_admin_directory")) || [];

            // Execute scan loop queries match structures
            const activeAdminNode = adminDirectory.find(adm => adm.email === email && adm.password === password);

            if (activeAdminNode) {
                // Initialize clean matching privilege tokens natively
                localStorage.setItem("activeAdminSession", JSON.stringify({
                    user: activeAdminNode.username,
                    level: activeAdminNode.tier
                }));

                window.location.href = "admin-dashboard.html";
            } else {
                alert("Security Intercept: Authentication Failed. Handshake validation key rejected.");
            }
        });
    </script>
</body>
</html>
