<!-- =========================
     admin-register.html
========================= -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provision Admin Node | UNIADMIN</title>
    
    <!-- Framework Elements -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --bg-canvas: #0f172a;
            --surface-card: #1e293b;
            --brand-admin: #38bdf8;
            --border-light: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-canvas);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 500px;
        }

        .auth-card {
            background: var(--surface-card);
            border-radius: 24px;
            padding: 40px;
            border: 1px solid var(--border-light);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        .brand-logo {
            font-size: 2rem;
            font-weight: 800;
            font-family: 'Poppins', sans-serif;
            letter-spacing: -0.5px;
            text-align: center;
            margin-bottom: 24px;
            color: #ffffff;
        }

        .brand-logo span {
            color: var(--brand-admin);
        }

        .form-control, .form-select {
            background-color: #0f172a !important;
            border-color: var(--border-light);
            color: #ffffff !important;
        }

        .form-control::placeholder {
            color: #475569;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--brand-admin);
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.15);
        }

        .input-group-text {
            background-color: #0f172a !important;
            border-color: var(--border-light);
            color: var(--text-muted);
        }

        .btn-auth-submit {
            background: var(--brand-admin);
            color: #0f172a;
            font-weight: 700;
            border: none;
            padding: 12px;
            border-radius: 12px;
            transition: all 0.2s ease;
        }

        .btn-auth-submit:hover {
            background: #7dd3fc;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">
            <div class="brand-logo">UNI<span>ADMIN</span></div>
            <h5 class="fw-bold text-center mb-1 text-white">Deploy System Admin Node</h5>
            <p class="text-muted text-center small mb-4">Instantiate structural privileges within the global registry.</p>

            <form id="adminRegistrationForm">
                <div class="mb-3">
                    <label class="form-label small fw-semibold text-muted">Administrator Username</label>
                    <div class="input-group">
                        <span class="input-group-text border-end-0"><i class="far fa-user"></i></span>
                        <input type="text" id="adminRegUser" class="form-control border-start-0 ps-0" placeholder="e.g., SysAdmin_Nitin" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label small fw-semibold text-muted">Administrative Security Email</label>
                    <div class="input-group">
                        <span class="input-group-text border-end-0"><i class="far fa-envelope"></i></span>
                        <input type="email" id="adminRegEmail" class="form-control border-start-0 ps-0" placeholder="admin@unicore.edu" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label small fw-semibold text-muted">Authority Tier Level</label>
                    <div class="input-group">
                        <span class="input-group-text border-end-0"><i class="fas fa-shield-halved"></i></span>
                        <select id="adminRegTier" class="form-select border-start-0 ps-0" required>
                            <option value="" disabled selected>Select Authority Level</option>
                            <option value="Root Tier Level-1 Access">Root Tier Level-1</option>
                            <option value="Syllabus Management Controller">Syllabus Admin</option>
                            <option value="Audit Representative">Auditor Tier</option>
                        </select>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label small fw-semibold text-muted">Encryption Passphrase</label>
                    <div class="input-group">
                        <span class="input-group-text border-end-0"><i class="fas fa-key"></i></span>
                        <input type="password" id="adminRegPassword" class="form-control border-start-0 ps-0" placeholder="••••••••" minlength="8" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-auth-submit w-100 mb-3">Provision Terminal Authority</button>

                <p class="text-center small text-muted mb-0">
                    Console already open? <a href="admin-login.html" class="text-decoration-none fw-semibold text-info">Synchronize Session</a>
                </p>
            </form>
        </div>
    </div>

    <script>
        document.getElementById("adminRegistrationForm").addEventListener("submit", (e) => {
            e.preventDefault();

            const username = document.getElementById("adminRegUser").value.trim();
            const email = document.getElementById("adminRegEmail").value.trim().toLowerCase();
            const tier = document.getElementById("adminRegTier").value;
            const password = document.getElementById("adminRegPassword").value;

            let adminDirectory = JSON.parse(localStorage.getItem("unicore_admin_directory")) || [];

            // Duplicate Admin Guard Exception Check
            const adminExists = adminDirectory.some(adm => adm.email === email || adm.username === username);
            if (adminExists) {
                alert("Authorization Core Error: Username or Security Email already allocated to an operational node.");
                return;
            }

            const newAdminRecord = {
                username: username,
                email: email,
                tier: tier,
                password: password
            };

            adminDirectory.push(newAdminRecord);
            localStorage.setItem("unicore_admin_directory", JSON.stringify(adminDirectory));

            alert("Administrative terminal keys provisioned. Initializing handshake gate.");
            window.location.href = "admin-login.html";
        });
    </script>
</body>
</html>
